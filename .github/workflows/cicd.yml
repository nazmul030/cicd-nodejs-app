name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  print_the_text:
    runs-on: ubuntu-latest
    steps:
      - name: Git Clone
        uses: actions/checkout@v3
      - name: Print the text
        run: |
          echo "Hello from CI/CD Pipeline" > hello.txt
          cat hello.txt
          ls -la
          pwd
          